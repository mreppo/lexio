<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lexio/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/lexio/icons/favicon.png" />
    <!-- Apple touch icon for iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/lexio/icons/apple-touch-icon.png" />
    <!-- viewport: viewport-fit=cover exposes the safe-area-inset-* CSS env() variables
         which are needed to handle the iPhone notch and home indicator. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <!-- iOS PWA meta tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lexio" />
    <title>Lexio</title>
    <!-- Google Fonts: Sora (display) + Nunito (body). Both support Latvian diacritics.
         No integrity attribute: Google Fonts CSS is dynamically generated per user-agent
         and changes frequently, making static SRI hashes impractical. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
