<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/lexio/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/lexio/icons/favicon.png" />
    <!-- Apple touch icon for iOS home screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/lexio/icons/apple-touch-icon.png" />
    <!-- viewport: viewport-fit=cover exposes the safe-area-inset-* CSS env() variables
         which are needed to handle the iPhone notch and home indicator. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0f1a" />
    <!-- PWA meta tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lexio" />
    <title>Lexio - Vocabulary Trainer Built by AI</title>
    <!-- SEO description -->
    <meta
      name="description"
      content="Learn vocabulary in any language. Designed by a human, built entirely by autonomous AI agents."
    />
    <!-- Open Graph / social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mreppo.github.io/lexio/" />
    <meta property="og:title" content="Lexio - Vocabulary Trainer Built by AI" />
    <meta
      property="og:description"
      content="Learn vocabulary in any language. Designed by a human, built entirely by autonomous AI agents."
    />
    <meta property="og:image" content="https://mreppo.github.io/lexio/og-image.png" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Lexio - Vocabulary Trainer Built by AI" />
    <meta
      name="twitter:description"
      content="Learn vocabulary in any language. Designed by a human, built entirely by autonomous AI agents."
    />
    <meta name="twitter:image" content="https://mreppo.github.io/lexio/og-image.png" />
    <!-- Google Fonts: Sora (display) + Nunito (body). Both support Latvian diacritics.
         No integrity attribute: Google Fonts CSS is dynamically generated per user-agent
         and changes frequently, making static SRI hashes impractical. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    />
    <!-- GoatCounter analytics: cookie-free, GDPR-compliant, ~3.5KB gzipped.
         no_onload: true disables automatic pageview on load — required for
         HashRouter SPAs where GoatCounter's pushState detection does not fire.
         Pageviews are sent manually via the useAnalytics hook instead. -->
    <script>
      window.goatcounter = { no_onload: true }
    </script>
    <script
      data-goatcounter="https://lexio.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
