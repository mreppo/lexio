<!DOCTYPE html><html><head><meta charset="utf-8"><title>Semantic colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
  .sw { padding:14px 12px; border-radius:14px; border:0.5px solid var(--lx-rule); }
  .chip { width:36px; height:36px; border-radius:10px; margin-bottom:8px; }
  .name { font:600 12px var(--lx-font-body); letter-spacing:-0.1px; }
  .hex { font:500 11px var(--lx-font-mono); color:var(--lx-ink-faint); margin-top:2px; }
  .pair { display:flex; gap:6px; margin-bottom:8px; }
  .pair .chip { width:18px; height:36px; margin-bottom:0; border-radius:6px; }
</style></head>
<body>
  <div class="sw"><div class="pair"><div class="chip" style="background:#34C759"></div><div class="chip" style="background:#30D158"></div></div><div class="name">ok</div><div class="hex">#34C759 / #30D158</div></div>
  <div class="sw"><div class="pair"><div class="chip" style="background:#FF9500"></div><div class="chip" style="background:#FF9F0A"></div></div><div class="name">warn</div><div class="hex">#FF9500 / #FF9F0A</div></div>
  <div class="sw"><div class="pair"><div class="chip" style="background:#FF3B30"></div><div class="chip" style="background:#FF453A"></div></div><div class="name">red</div><div class="hex">#FF3B30 / #FF453A</div></div>
  <div class="sw"><div class="pair"><div class="chip" style="background:#AF52DE"></div><div class="chip" style="background:#BF5AF2"></div></div><div class="name">violet</div><div class="hex">#AF52DE / #BF5AF2</div></div>
  <div class="sw"><div class="pair"><div class="chip" style="background:#FF2D55"></div><div class="chip" style="background:#FF375F"></div></div><div class="name">pink</div><div class="hex">#FF2D55 / #FF375F</div></div>
</body></html>
