<!DOCTYPE html><html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; }
  .row { display:flex; align-items:center; gap:12px; padding:5px 0; }
  .bar { background:var(--lx-accent); height:14px; border-radius:3px; }
  .label { font:600 12px var(--lx-font-body); width:30px; flex-shrink:0; }
  .px { font:500 11px var(--lx-font-mono); color:var(--lx-ink-faint); width:36px; text-align:right; flex-shrink:0; }
  h4 { font:700 12px var(--lx-font-body); letter-spacing:1px; text-transform:uppercase; color:var(--lx-ink-faint); margin:8px 0 6px; }
</style></head>
<body>
  <h4>Scale (px)</h4>
  <div class="row"><div class="label">1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="label">2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="label">3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="label">4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="label">5</div><div class="bar" style="width:20px"></div><div class="px">20</div></div>
  <div class="row"><div class="label">6</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="label">7</div><div class="bar" style="width:36px"></div><div class="px">36</div></div>
  <div class="row"><div class="label">8</div><div class="bar" style="width:56px"></div><div class="px">56</div></div>
  <div class="row"><div class="label">9</div><div class="bar" style="width:72px"></div><div class="px">72</div></div>
</body></html>
