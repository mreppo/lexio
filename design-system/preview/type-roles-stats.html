<!DOCTYPE html><html><head><meta charset="utf-8"><title>Stats type roles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:0.5px solid var(--lx-rule); }
  .row:last-child { border-bottom:none; }
  .meta { font-family:var(--lx-font-mono); font-size:11px; color:var(--lx-ink-faint); width:160px; flex-shrink:0; }
  .streak-eyebrow { font-family:var(--lx-font-body); font-size:13px; font-weight:800; letter-spacing:1px; line-height:1; text-transform:uppercase; }
  .streak-helper { font-family:var(--lx-font-body); font-size:18px; font-weight:600; letter-spacing:-0.2px; line-height:1.2; color:var(--lx-ink-sec); }
  .stat-num { font-family:var(--lx-font-display); font-size:30px; font-weight:800; letter-spacing:-0.7px; line-height:1.05; }
  .stat-sub { font-family:var(--lx-font-body); font-size:12px; font-weight:700; letter-spacing:-0.1px; line-height:1.2; color:var(--lx-ok); }
  .bar-day { font-family:var(--lx-font-body); font-size:11px; font-weight:600; line-height:1; color:var(--lx-ink-faint); }
  .addword-term { font-family:var(--lx-font-display); font-size:30px; font-weight:800; letter-spacing:-0.7px; line-height:1.1; }
  .addword-meaning { font-family:var(--lx-font-body); font-size:20px; font-weight:500; letter-spacing:-0.3px; line-height:1.3; color:var(--lx-ink-sec); }
</style></head>
<body>
  <div class="row"><div class="meta">streakEyebrow 13/800</div><div class="streak-eyebrow">Streak</div></div>
  <div class="row"><div class="meta">streakHelper 18/600</div><div class="streak-helper">5 days · best 12</div></div>
  <div class="row"><div class="meta">statCardNumber 30/800</div><div class="stat-num">142</div></div>
  <div class="row"><div class="meta">statCardSub 12/700</div><div class="stat-sub">+18 this week</div></div>
  <div class="row"><div class="meta">barDayLabel 11/600</div><div class="bar-day">M T W T F S S</div></div>
  <div class="row"><div class="meta">addWordTerm 30/800</div><div class="addword-term">māja</div></div>
  <div class="row"><div class="meta">addWordMeaning 20/500</div><div class="addword-meaning">house, home</div></div>
</body></html>
