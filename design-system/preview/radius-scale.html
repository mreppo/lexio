<!DOCTYPE html><html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; display:grid; grid-template-columns:repeat(6,1fr); gap:12px; }
  .sw { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .chip { width:64px; height:64px; background:var(--lx-accent-soft); border:0.5px solid var(--lx-rule); }
  .name { font:600 12px var(--lx-font-body); letter-spacing:-0.1px; }
  .meta { font:500 11px var(--lx-font-mono); color:var(--lx-ink-faint); }
</style></head>
<body>
  <div class="sw"><div class="chip" style="border-radius:10px"></div><div class="name">iconSquare</div><div class="meta">10</div></div>
  <div class="sw"><div class="chip" style="border-radius:14px"></div><div class="name">inline</div><div class="meta">14</div></div>
  <div class="sw"><div class="chip" style="border-radius:18px"></div><div class="name">btn</div><div class="meta">18</div></div>
  <div class="sw"><div class="chip" style="border-radius:22px"></div><div class="name">card</div><div class="meta">22</div></div>
  <div class="sw"><div class="chip" style="border-radius:28px"></div><div class="name">glass</div><div class="meta">28</div></div>
  <div class="sw"><div class="chip" style="border-radius:999px"></div><div class="name">pill</div><div class="meta">999</div></div>
</body></html>
