<!DOCTYPE html><html><head><meta charset="utf-8"><title>Dark colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{background:#0A0A10;color:#fff;}
  body { margin:0; padding:20px; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .sw { padding:14px 12px; border-radius:14px; border:0.5px solid rgba(255,255,255,0.10); }
  .chip { width:32px; height:32px; border-radius:8px; margin-bottom:8px; border:0.5px solid rgba(255,255,255,0.10); }
  .name { font:600 12px -apple-system,Inter; color:#fff; letter-spacing:-0.1px; }
  .hex { font:500 11px ui-monospace; color:rgba(255,255,255,0.4); margin-top:2px; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#0A0A10"></div><div class="name">bg</div><div class="hex">#0A0A10</div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="name">ink</div><div class="hex">#FFFFFF</div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.82)"></div><div class="name">inkSoft</div><div class="hex">.82 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.55)"></div><div class="name">inkSec</div><div class="hex">.55 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.28)"></div><div class="name">inkFaint</div><div class="hex">.28 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.10)"></div><div class="name">rule2</div><div class="hex">.10 white</div></div>
  <div class="sw"><div class="chip" style="background:#0A84FF"></div><div class="name">accent</div><div class="hex">#0A84FF</div></div>
  <div class="sw"><div class="chip" style="background:rgba(10,132,255,0.22)"></div><div class="name">accentSoft</div><div class="hex">.22 alpha</div></div>
</body></html>
