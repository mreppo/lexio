<!DOCTYPE html><html><head><meta charset="utf-8"><title>Body type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:0.5px solid var(--lx-rule); }
  .row:last-child { border-bottom:none; }
  .meta { font-family:var(--lx-font-mono); font-size:11px; color:var(--lx-ink-faint); width:140px; flex-shrink:0; }
</style></head>
<body>
  <div class="row"><div class="meta">body 17/500 -0.3</div><div class="lx-body">Type the translation. Lexio supports any pair.</div></div>
  <div class="row"><div class="meta">button 17/600 -0.2</div><div class="lx-button">Start review</div></div>
  <div class="row"><div class="meta">copy 15/500 -0.2</div><div class="lx-copy">Spaced repetition focuses on words you struggle with.</div></div>
  <div class="row"><div class="meta">caption 13/500 -0.1</div><div class="lx-caption">Last reviewed 2 hours ago</div></div>
  <div class="row"><div class="meta">micro 12/700 -0.1</div><div class="lx-micro">B1 · Starter pack</div></div>
  <div class="row"><div class="meta">UPPER 13/700 +1</div><div class="lx-uppercase-label">Today's practice</div></div>
</body></html>
