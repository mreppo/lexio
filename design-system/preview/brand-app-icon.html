<!DOCTYPE html><html><head><meta charset="utf-8"><title>App icon</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#F4F2EE; display:flex; gap:18px; align-items:center; justify-content:center; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .icon { background:linear-gradient(135deg,#007AFF 0%,#AF52DE 100%); box-shadow:inset 0 1px 0 rgba(255,255,255,0.45),0 8px 24px rgba(0,122,255,0.32); display:flex; align-items:center; justify-content:center; color:#fff; font-family:var(--lx-font-display); font-weight:800; letter-spacing:-2px; }
  .meta { font:500 11px var(--lx-font-mono); color:var(--lx-ink-faint); }
  h4 { margin:0; font:700 11px var(--lx-font-body); letter-spacing:1px; text-transform:uppercase; color:var(--lx-ink-faint); }
</style></head>
<body>
  <div class="ic"><div class="icon" style="width:120px;height:120px;border-radius:28px;font-size:62px">L</div><div class="meta">120 · iOS</div></div>
  <div class="ic"><div class="icon" style="width:88px;height:88px;border-radius:22px;font-size:46px">L</div><div class="meta">88 · maskable</div></div>
  <div class="ic"><div class="icon" style="width:56px;height:56px;border-radius:16px;font-size:30px">L</div><div class="meta">56 · favicon</div></div>
  <div class="ic"><div class="icon" style="width:32px;height:32px;border-radius:10px;font-size:18px">L</div><div class="meta">32</div></div>
</body></html>
