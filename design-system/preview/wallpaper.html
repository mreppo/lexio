<!DOCTYPE html><html><head><meta charset="utf-8"><title>Wallpapers</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .wp { height:200px; border-radius:18px; padding:14px; box-sizing:border-box; display:flex; align-items:flex-end; }
  .light { background: radial-gradient(1200px 600px at 85% -10%, #FFD6A5 0%, transparent 50%), radial-gradient(900px 500px at -10% 30%, #A5C8FF 0%, transparent 55%), radial-gradient(800px 500px at 50% 110%, #FFB3D4 0%, transparent 55%), linear-gradient(180deg,#F9F7F2 0%,#EEEDF6 100%); color:#111114; }
  .dark { background: radial-gradient(900px 500px at 100% -10%, #3A1E6B 0%, transparent 55%), radial-gradient(900px 500px at -10% 50%, #0F3B6C 0%, transparent 55%), radial-gradient(700px 400px at 50% 110%, #6B1E4A 0%, transparent 55%), linear-gradient(180deg,#0A0A10 0%,#14121D 100%); color:#fff; }
  .label { font:700 13px var(--lx-font-body); letter-spacing:-0.2px; padding:6px 12px; border-radius:999px; background:rgba(255,255,255,0.55); backdrop-filter:blur(20px); border:0.5px solid rgba(255,255,255,0.7); }
  .dark .label { background:rgba(255,255,255,0.10); border-color:rgba(255,255,255,0.22); }
</style></head>
<body>
  <div class="wp light"><span class="label">light · Liquid Glass</span></div>
  <div class="wp dark"><span class="label">dark · Liquid Glass</span></div>
</body></html>
