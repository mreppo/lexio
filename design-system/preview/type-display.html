<!DOCTYPE html><html><head><meta charset="utf-8"><title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:0.5px solid var(--lx-rule); }
  .row:last-child { border-bottom:none; }
  .meta { font-family:var(--lx-font-mono); font-size:11px; color:var(--lx-ink-faint); width:140px; flex-shrink:0; }
  .specimen { color:var(--lx-ink); }
</style></head>
<body>
  <div class="row"><div class="meta">heroWord 72/800 -1.2</div><div class="specimen lx-hero-word">māja</div></div>
  <div class="row"><div class="meta">onboard 42/800 -1</div><div class="specimen lx-onboard-headline">What language pair?</div></div>
  <div class="row"><div class="meta">largeTitle 36/800 -1</div><div class="specimen lx-large-title">Good morning</div></div>
  <div class="row"><div class="meta">title 28/800 -0.6</div><div class="specimen lx-title">Today's practice</div></div>
</body></html>
