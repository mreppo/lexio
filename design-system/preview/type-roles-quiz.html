<!DOCTYPE html><html><head><meta charset="utf-8"><title>Quiz type roles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; }
  .row { display:flex; align-items:baseline; gap:16px; padding:8px 0; border-bottom:0.5px solid var(--lx-rule); }
  .row:last-child { border-bottom:none; }
  .meta { font-family:var(--lx-font-mono); font-size:11px; color:var(--lx-ink-faint); width:160px; flex-shrink:0; }
  .quiz-display { font-family:var(--lx-font-display); font-size:26px; font-weight:700; letter-spacing:-0.5px; line-height:1.1; }
  .quiz-sub { font-family:var(--lx-font-body); font-size:15px; font-weight:500; letter-spacing:-0.2px; line-height:1.45; color:var(--lx-ink-sec); }
  .quiz-hint { font-family:var(--lx-font-body); font-size:13px; font-weight:500; letter-spacing:-0.1px; color:var(--lx-ink-sec); }
  .quiz-pill { font-family:var(--lx-font-body); font-size:14px; font-weight:700; letter-spacing:-0.1px; line-height:1; padding:6px 12px; border-radius:999px; background:var(--lx-glass-bg); display:inline-block; border:0.5px solid var(--lx-glass-border); }
  .quiz-option { font-family:var(--lx-font-body); font-size:17px; font-weight:600; letter-spacing:-0.3px; line-height:1.3; }
  .quiz-feedback { font-family:var(--lx-font-body); font-size:15px; font-weight:700; letter-spacing:-0.2px; color:var(--lx-ok); }
</style></head>
<body>
  <div class="row"><div class="meta">quizDisplay 26/700</div><div class="quiz-display">māj</div></div>
  <div class="row"><div class="meta">quizSub 15/500</div><div class="quiz-sub">noun · feminine</div></div>
  <div class="row"><div class="meta">quizHint 13/500</div><div class="quiz-hint">Tip: starts with "m"</div></div>
  <div class="row"><div class="meta">quizPill 14/700</div><div class="quiz-pill">3 / 12</div></div>
  <div class="row"><div class="meta">quizOption 17/600</div><div class="quiz-option">house</div></div>
  <div class="row"><div class="meta">feedback 15/700</div><div class="quiz-feedback">Correct · +1 XP</div></div>
</body></html>
