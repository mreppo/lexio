<!DOCTYPE html><html><head><meta charset="utf-8"><title>Light colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .sw { padding:14px 12px; border-radius:14px; border:0.5px solid var(--lx-rule); }
  .chip { width:32px; height:32px; border-radius:8px; margin-bottom:8px; border:0.5px solid var(--lx-rule); }
  .name { font:600 12px var(--lx-font-body); color:var(--lx-ink); letter-spacing:-0.1px; }
  .hex { font:500 11px var(--lx-font-mono); color:var(--lx-ink-faint); margin-top:2px; }
</style></head>
<body>
  <div class="sw"><div class="chip" style="background:#F4F2EE"></div><div class="name">bg</div><div class="hex">#F4F2EE</div></div>
  <div class="sw"><div class="chip" style="background:#111114"></div><div class="name">ink</div><div class="hex">#111114</div></div>
  <div class="sw"><div class="chip" style="background:rgba(30,30,36,0.75)"></div><div class="name">inkSoft</div><div class="hex">.75 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(30,30,36,0.70)"></div><div class="name">inkSec</div><div class="hex">.70 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(30,30,36,0.28)"></div><div class="name">inkFaint</div><div class="hex">.28 alpha</div></div>
  <div class="sw"><div class="chip" style="background:rgba(0,0,0,0.08);border:0.5px solid #ddd"></div><div class="name">rule2</div><div class="hex">.08 black</div></div>
  <div class="sw"><div class="chip" style="background:#007AFF"></div><div class="name">accent</div><div class="hex">#007AFF</div></div>
  <div class="sw"><div class="chip" style="background:rgba(0,122,255,0.14)"></div><div class="name">accentSoft</div><div class="hex">.14 alpha</div></div>
</body></html>
